version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: skillsphere_db
    environment:
      POSTGRES_DB: skillsphere
      POSTGRES_USER: skillsphere_user
      POSTGRES_PASSWORD: skillsphere_secure_pwd_123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
